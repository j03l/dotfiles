# tmux-sessionizer config

# Project search paths
TS_SEARCH_PATHS=(~/dev)

# Extra search paths (depth optional via :number suffix)
TS_EXTRA_SEARCH_PATHS=(${DOTFILES:-~/dotfiles}:0)

# Max search depth (default: 1)
# TS_MAX_DEPTH=2

# Session commands (used with -s flag)
# Slot 0: Alt-h, Slot 1: Alt-t, Slot 2: Alt-n, Slot 3: Alt-s
# TS_SESSION_COMMANDS=("htop" "nvim ~/dotfiles/STUDY-GUIDE.md" "lazygit")
