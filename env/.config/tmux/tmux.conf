set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -s escape-time 0

# Mouse + scrollback
set -g mouse on
set -g history-limit 10000
set -g status-interval 1

# Window behavior
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Status bar (tokyonight-night palette)
set -g status-style 'bg=#16161e fg=#a9b1d6'
set -g status-left '#{?client_prefix,#[bg=#7aa2f7 fg=#16161e bold] 🐶 #[default] ,}#[bg=#3d59a1 fg=#c0caf5 bold] #S#[fg=#7dcfff]@#h #[default] '
set -g status-right '#[fg=#c0caf5]"#W" #[fg=#7aa2f7]%d-%m-%Y #[fg=#7dcfff]%I:%M %p '
set -g status-left-length 50
set -g status-right-length 80
set -g window-status-current-format '#[bg=#292e42 fg=#7aa2f7 bold] #I:#W#{?#{>:#{window_panes},1},[#{window_panes}],}* '
set -g window-status-format '#[fg=#545c7e] #I:#W#{?#{>:#{window_panes},1},[#{window_panes}],}- '
set -g window-status-separator ''
set -g monitor-activity off
set -g visual-activity off
set -g pane-border-style 'fg=#3b4261'
set -g pane-active-border-style 'fg=#9ece6a'
set -g pane-border-lines heavy
set -g window-style 'fg=#565f89'
set -g window-active-style 'fg=#c0caf5'
set -g message-style 'bg=#292e42 fg=#7aa2f7'

# Vi mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'

# Vim-like pane switching
bind -r b last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/dotfiles/STUDY-GUIDE.md"

# Sessionizer
bind-key -r C-f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
bind-key -r M-h run-shell "tmux neww tmux-sessionizer -s 0"
bind-key -r M-t run-shell "tmux neww tmux-sessionizer -s 1"
bind-key -r M-n run-shell "tmux neww tmux-sessionizer -s 2"

# Reload config
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Cheatsheet popup
bind-key H display-popup -E -w 80% -h 80% "cheatsheet"

# Claude Code scratchpad (same key toggles open/closed)
bind-key a if-shell -F '#{==:#{session_name},claude}' 'detach-client' 'display-popup -E -w 80% -h 80% -d "#{pane_current_path}" -S "fg=#bb9af7" -T "#[fg=#bb9af7,bold] ai " "tmux-claude"'

# vim-tmux-navigator (seamless pane/nvim switching)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
