set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"
set -s escape-time 0

# Mouse + scrollback
set -g mouse on
set -g history-limit 10000
set -g status-interval 1

# Window behavior
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Status bar (tokyonight-night palette)
set -g status-style 'bg=#16161e fg=#a9b1d6'
set -g status-left '\
#{?client_prefix,#[bg=#7aa2f7 fg=#16161e bold] 🐶 #[default] ,}\
#{?#{&&:#{==:#{@bookmark_mode},1},#{&&:#{==:#{@bm_1},},#{&&:#{==:#{@bm_2},},#{&&:#{==:#{@bm_3},},#{==:#{@bm_4},}}}}},#[bg=#f7768e fg=#16161e bold] · ,}\
#{?#{!=:#{@bm_1},},#[range=user|bm1]#{?#{==:#{@bookmark_mode},1},#[bg=#f7768e fg=#16161e bold] H ,#[bg=#9ece6a fg=#16161e bold] H#{?#{==:#{@bm_1},#{session_name}},*,} }#[norange],}\
#{?#{!=:#{@bm_2},},#[range=user|bm2]#{?#{==:#{@bookmark_mode},1},#[bg=#f7768e fg=#16161e bold] J ,#[bg=#bb9af7 fg=#16161e bold] J#{?#{==:#{@bm_2},#{session_name}},*,} }#[norange],}\
#{?#{!=:#{@bm_3},},#[range=user|bm3]#{?#{==:#{@bookmark_mode},1},#[bg=#f7768e fg=#16161e bold] K ,#[bg=#7dcfff fg=#16161e bold] K#{?#{==:#{@bm_3},#{session_name}},*,} }#[norange],}\
#{?#{!=:#{@bm_4},},#[range=user|bm4]#{?#{==:#{@bookmark_mode},1},#[bg=#f7768e fg=#16161e bold] L ,#[bg=#ff9e64 fg=#16161e bold] L#{?#{==:#{@bm_4},#{session_name}},*,} }#[norange],}\
#[default]#{?#{||:#{!=:#{@bm_1},},#{||:#{!=:#{@bm_2},},#{||:#{!=:#{@bm_3},},#{||:#{!=:#{@bm_4},},#{==:#{@bookmark_mode},1}}}}}, ,}#[bg=#3d59a1 fg=#c0caf5 bold] #S#[fg=#7dcfff]@#h #[default] '
set -g status-right '#[fg=#c0caf5]"#W" #[fg=#7aa2f7]%d-%m-%Y #[fg=#7dcfff]%I:%M %p '
set -g status-left-length 80
set -g status-right-length 80
set -g window-status-current-format '#[bg=#292e42 fg=#7aa2f7 bold] #I:#{?#{==:#{pane_current_command},nvim},#{pane_title},#W}#{?#{>:#{window_panes},1},[#{window_panes}],}* '
set -g window-status-format '#[fg=#545c7e] #I:#{?#{==:#{pane_current_command},nvim},#{pane_title},#W}#{?#{>:#{window_panes},1},[#{window_panes}],}- '
set -g window-status-separator ''
set -g monitor-activity off
set -g visual-activity off
set -g pane-border-style 'fg=#3b4261'
set -g pane-active-border-style 'fg=#9ece6a'
set -g pane-border-lines heavy
set -g window-style 'fg=#565f89'
set -g window-active-style 'fg=#c0caf5'
set -g message-style 'bg=#292e42 fg=#7aa2f7'

# Vi mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'

# Vim-like pane switching
bind -r b last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/dotfiles/STUDY-GUIDE.md"

# Sessionizer
bind-key -r C-f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Session bookmarks (4 slots, persisted to ~/.local/share/tmux/bookmarks)
set -g @bm_1 ""
set -g @bm_2 ""
set -g @bm_3 ""
set -g @bm_4 ""
set -g @bookmark_mode 0
run-shell "tmux-bookmark restore"

# Bookmark: set (prefix + m -> h/j/k/l)
bind-key m set-option -g @bookmark_mode 1 \; refresh-client -S \; switch-client -T bookmark-set \; run-shell -b 'tmux set-option -g @bm_timeout "$$"; sleep 3; [ "$(tmux show-option -gqv @bm_timeout)" = "$$" ] && tmux set-option -g @bookmark_mode 0 && tmux refresh-client -S'
bind-key -T bookmark-set h run-shell "tmux-bookmark set 1 #{session_name}"
bind-key -T bookmark-set j run-shell "tmux-bookmark set 2 #{session_name}"
bind-key -T bookmark-set k run-shell "tmux-bookmark set 3 #{session_name}"
bind-key -T bookmark-set l run-shell "tmux-bookmark set 4 #{session_name}"
bind-key -T bookmark-set m set-option -g @bookmark_mode 0 \; refresh-client -S \; confirm-before -p "Clear all bookmarks? (y/n)" "run-shell 'tmux-bookmark reset'"
bind-key -T bookmark-set Escape set-option -g @bookmark_mode 0 \; refresh-client -S
bind-key -T bookmark-set MouseDown1Pane set-option -g @bookmark_mode 0 \; refresh-client -S
bind-key -T bookmark-set MouseDown1Status set-option -g @bookmark_mode 0 \; refresh-client -S

# Bookmark: click status bar indicators to switch (non-bookmark clicks use default select-window)
bind-key -T root MouseDown1Status if-shell -F '#{m:bm*,#{mouse_status_range}}' \
    'run-shell "case \"#{mouse_status_range}\" in bm1) tmux-bookmark goto 1;; bm2) tmux-bookmark goto 2;; bm3) tmux-bookmark goto 3;; bm4) tmux-bookmark goto 4;; esac"' \
    'select-window -t ='

# Bookmark: goto (Alt + h/j/k/l, no prefix)
bind-key -n M-h run-shell "tmux-bookmark goto 1"
bind-key -n M-j run-shell "tmux-bookmark goto 2"
bind-key -n M-k run-shell "tmux-bookmark goto 3"
bind-key -n M-l run-shell "tmux-bookmark goto 4"

# Reload config
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Cheatsheet popup
bind-key H display-popup -E -w 80% -h 80% "cheatsheet"

# Claude Code scratchpad (same key toggles open/closed)
bind-key a if-shell -F '#{==:#{session_name},claude}' 'detach-client' 'display-popup -E -w 80% -h 80% -d "#{pane_current_path}" -S "fg=#bb9af7" -T "#[fg=#bb9af7,bold] ai " "tmux-claude"'

# Session persistence (prefix + S to save, prefix + R to restore)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# vim-tmux-navigator (seamless pane/nvim switching)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
