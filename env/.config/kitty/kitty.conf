# vim:fileencoding=utf-8:foldmethod=marker

#: Font Configuration {{{
font_family      CaskaydiaCove Nerd Font Mono
bold_font        CaskaydiaCove Nerd Font Mono Bold
italic_font      CaskaydiaCove Nerd Font Mono Italic
bold_italic_font CaskaydiaCove Nerd Font Mono Bold Italic
font_size 12
disable_ligatures never
text_composition_strategy platform
#: }}}

#: Theme {{{
include themes/tokyonight_night.conf
background_opacity 0.95
dynamic_background_opacity yes
cursor_shape beam
cursor_blink_interval 0
cursor_stop_blinking_after 15.0
#: }}}

#: Window & Layout {{{
remember_window_size yes
initial_window_width  1200
initial_window_height 800
window_padding_width 5
window_border_width 1pt
draw_minimal_borders yes
active_border_color #83AFE5
inactive_border_color #444444
confirm_os_window_close 0
#: }}}

#: Tab Bar {{{
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style round
tab_title_template "{index}: {title}"
active_tab_font_style bold
tab_bar_min_tabs 2
#: }}}

#: Scrollback & Performance {{{
scrollback_lines 10000
scrollback_multiplier 3.0
repaint_delay 8
input_delay 2
sync_to_monitor yes
scrollback_pager less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER
#: }}}

#: Mouse & Selection {{{
url_style dashed
detect_urls yes
show_hyperlink_targets yes
select_by_word_characters @-./_~?&=%+#
click_interval 0.5
copy_on_select clipboard
mouse_hide_wait 3.0
focus_follows_mouse no
#: }}}

#: Audio & Notifications {{{
enable_audio_bell no
visual_bell_duration 0.0
window_alert_on_bell no
notify_on_cmd_finish invisible 5.0
#: }}}

#: Advanced Features {{{
shell_integration no-cursor no-sudo no-title
clipboard_control write-clipboard write-primary read-clipboard-ask read-primary-ask
clipboard_max_size 64
allow_hyperlinks yes
update_check_interval 0
#: }}}

#: Keyboard Shortcuts {{{
kitty_mod ctrl+shift
map kitty_mod+equal  change_font_size all +1.0
map kitty_mod+minus  change_font_size all -1.0
map kitty_mod+0      change_font_size all 0
map kitty_mod+f5 load_config_file
map kitty_mod+enter new_window_with_cwd
map kitty_mod+t     new_tab_with_cwd
map kitty_mod+backslash launch --location=vsplit --cwd=current
map kitty_mod+apostrophe launch --location=hsplit --cwd=current
map kitty_mod+h neighboring_window left
map kitty_mod+j neighboring_window down
map kitty_mod+k neighboring_window up
map kitty_mod+l neighboring_window right
map kitty_mod+e open_url_with_hints
map kitty_mod+o open_url_with_hints
map kitty_mod+u kitten hints --type url
map kitty_mod+p kitten hints --type path --program -
map kitty_mod+f1 show_kitty_doc overview
map f11 toggle_fullscreen
map kitty_mod+f launch --type=overlay --stdin-source=@screen_scrollback /usr/bin/less +G -R
map kitty_mod+a>m set_background_opacity +0.05
map kitty_mod+a>l set_background_opacity -0.05
map kitty_mod+a>1 set_background_opacity 1
map kitty_mod+a>d set_background_opacity default
map kitty_mod+delete clear_terminal reset active
#: }}}

#: Linux-Specific Settings {{{
linux_display_server auto
wayland_titlebar_color background
term xterm-256color
#: }}}

#: Development {{{
shell /bin/zsh
editor nvim
allow_remote_control socket-only
listen_on unix:/tmp/kitty
close_on_child_death no
#: }}}
